# lightning==2.3.0.dev0
seed_everything: 1
trainer:
  accelerator: gpu
  devices: 1
  strategy: ddp_find_unused_parameters_true
  max_epochs: 50
  use_distributed_sampler: False
  limit_train_batches: 100
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  default_root_dir: ./results
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0
  num_sanity_val_steps: 1
  inference_mode: false
model:
  forecaster:
    class_path: probts.model.forecaster.prob_forecaster.TSDiffCond_ms
    init_args:
      timesteps: 32
      hidden_dim: 128
      step_emb: 128
      num_residual_blocks: 3
      dropout: 0.0
      use_lags: false
      use_feat_idx_emb: false
      use_time_feat: false
      feat_idx_emb_dim: 1
      use_scaling: false
      init_skip: false
      feature_skip: true
      ema_params:
        beta: 0.9999
        update_after_step: 128
        update_every: 1
      prior_params:
        kernel: "ou"
        gamma: 1.0
        context_freqs: 11
  set_global_grad: true
  num_samples: 100
  learning_rate: 0.001
  quantiles_num: 20
data:
  data_manager:
    class_path: probts.data.data_manager.DataManager
    init_args:
      dataset: etth1
      split_val: true
      scaler: temporal # identity, standard, temporal
      context_length: 24
      prediction_length: 24
  batch_size: 64
  test_batch_size: 32
  num_workers: 8


